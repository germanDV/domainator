{{define "base"}}
<!DOCTYPE html>
<html lang="en">

    <link rel="stylesheet" href="https://fonts.googleapis.com/css?family=Ubuntu+Mono:400,700" />
    <script defer src="/static/js/main.js" type="text/javascript"></script>
