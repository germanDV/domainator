version: '3.1'

services:
  db:
    image: postgres:15-alpine
    restart: on-failure
    healthcheck:
      test: ["CMD", "pg_isready", "-h", "localhost", "-U", "postgres"]
      interval: 15s
      timeout: 10s
      retries: 3
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: pass123
      POSTGRES_DB: domainator
    ports:
      - 5432:5432
    # user: postgres
    # volumes:
    #   - ./data/postgres:/var/lib/postgresql/data
